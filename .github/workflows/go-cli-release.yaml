name: go-cli-release

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    tags:
      - 'go-cli-v*'

permissions:
  contents: write
  packages: write

jobs:
  build-go-cli:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-cli/go.mod

      - name: build-binary
        working-directory: go-cli
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi

          out="aperiodic-cli-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w" -o "dist/${out}" .

      - name: package-binary
        working-directory: go-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p artifacts
          if [ "$GOOS" = "windows" ]; then
            archive="artifacts/aperiodic-cli-${GOOS}-${GOARCH}.zip"
            (cd dist && zip -r "../${archive}" "aperiodic-cli-${GOOS}-${GOARCH}.exe")
          else
            archive="artifacts/aperiodic-cli-${GOOS}-${GOARCH}.tar.gz"
            tar -C dist -czf "$archive" "aperiodic-cli-${GOOS}-${GOARCH}"
          fi
          echo "ARCHIVE_PATH=$archive" >> "$GITHUB_ENV"

      - name: upload-build-artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go-cli/artifacts/*
          if-no-files-found: error

  publish-go-cli:
    name: publish-go-cli-packages
    needs: build-go-cli
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/go-cli-v')

    steps:
      - name: download-artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: flatten-artifacts
        run: |
          mkdir -p release-assets
          find dist-artifacts -type f -maxdepth 3 -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: upload-to-github-release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*

      - name: upload-to-package-repository
        if: ${{ secrets.GO_CLI_PACKAGE_REPOSITORY_URL != '' && secrets.GO_CLI_PACKAGE_REPOSITORY_TOKEN != '' }}
        env:
          PACKAGE_REPOSITORY_URL: ${{ secrets.GO_CLI_PACKAGE_REPOSITORY_URL }}
          PACKAGE_REPOSITORY_TOKEN: ${{ secrets.GO_CLI_PACKAGE_REPOSITORY_TOKEN }}
        run: |
          set -euo pipefail
          for artifact in release-assets/*; do
            name=$(basename "$artifact")
            echo "Publishing ${name} to ${PACKAGE_REPOSITORY_URL}"
            curl --fail --show-error --silent \
              -X PUT \
              -H "Authorization: Bearer ${PACKAGE_REPOSITORY_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${artifact}" \
              "${PACKAGE_REPOSITORY_URL%/}/${name}"
          done
