name: tests

on:
  push:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API base URL to test against'
        required: false
        default: ''

jobs:
  run-tests:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          # - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: install-dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[tests]"

      - name: run-tests
        env:
          APERIODIC_API_KEY: ${{ secrets.APERIODIC_API_KEY }}
          APERIODIC_API_URL: ${{ inputs.base_url || '' }}
        run: pytest . -s --cov --durations 0

      - uses: codecov/codecov-action@v3
