name: tests

on:
  push:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API base URL to test against'
        required: false
        default: ''

jobs:
  run-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          # - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        backend:
          - polars
          - pandas
          - polars-preinstalled

    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: install-dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.backend }}" = "polars-preinstalled" ]; then
            pip install ".[tests]"
            pip install polars
          else
            pip install ".[${{ matrix.backend }},tests]"
            if [ "${{ matrix.backend }}" = "pandas" ]; then
              pip uninstall -y polars || true
              python -c "import importlib.util; assert importlib.util.find_spec('polars') is None, 'polars must not be installed in pandas job'"
            fi
          fi

      - name: run-tests
        env:
          # inputs.base_url is empty on push-triggered runs (test against production),
          # but set to a staging URL when dispatched externally (e.g. from unravel-router).
          # Use the staging API key when a base_url is provided, otherwise production.
          APERIODIC_API_KEY: ${{ inputs.base_url && secrets.APERIODIC_STAGING_API_KEY || secrets.APERIODIC_API_KEY }}
          APERIODIC_API_URL: ${{ inputs.base_url || '' }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: pytest . -s --cov --durations 0

      - uses: codecov/codecov-action@v3

  # ---------------------------------------------------------------------------
  # Pyodide/WASM end-to-end smoke test.
  #
  # Boots a real Pyodide 0.27.7 inside Node.js, installs our freshly-built
  # wheel via micropip, and verifies the sync API surface works in the
  # marimo-WASM runtime without going through a PyPI release. See
  # tests/pyodide_smoke/smoke.js for the checks.
  #
  # Runs only when the Pyodide-relevant surface changed (the pyfetch
  # transport, the backend selector, the sync wrappers, the smoke test
  # itself, or the CI workflow) — otherwise a no-op so every push doesn't
  # pay a ~2-min Pyodide boot just to rebuild the wheel again.
  # ---------------------------------------------------------------------------
  detect-pyodide-relevant-changes:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.filter.outputs.pyodide }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pyodide:
              - 'src/aperiodic/_backends/_pyfetch_transport.py'
              - 'src/aperiodic/_backends/_pandas.py'
              - 'src/aperiodic/_compat.py'
              - 'src/aperiodic/client.py'
              - 'src/aperiodic/endpoints/**'
              - 'pyproject.toml'
              - 'tests/pyodide_smoke/**'
              - '.github/workflows/tests.yaml'

  pyodide-smoke:
    needs: detect-pyodide-relevant-changes
    # Always run on workflow_dispatch so we can sanity-check on demand.
    if: |
      needs.detect-pyodide-relevant-changes.outputs.should-run == 'true'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/pyodide_smoke/package-lock.json

      - name: build wheel
        run: |
          python -m pip install --upgrade pip hatch
          hatch build -t wheel
          ls -la dist/

      - name: install Pyodide (Node)
        working-directory: tests/pyodide_smoke
        run: npm install

      - name: run Pyodide smoke test
        working-directory: tests/pyodide_smoke
        # `--experimental-wasm-jspi` enables the JavaScript Promise
        # Integration that pyodide.ffi.run_sync relies on. Real browsers
        # ship JSPI enabled (Chrome 123+ / Safari 18.2+) so end-users
        # never need a flag; Node just hasn't stabilised it yet.
        run: node --experimental-wasm-jspi smoke.js
